# Config for the official 42 cgi_tester (`./tester`).
# Requirements it asked for, mapped to blocks below:
#   1. /            -> GET only
#   2. *.bla files  -> POST, run the cgi_tester executable
#   3. /post_body   -> POST, max body 100 bytes
#   4. /directory/  -> GET, root = YoupiBanane, index youpi.bad_extension

server {
    listen 127.0.0.1:8080;
    client_max_body_size 1G;           # generous default; /post_body overrides below

    # (1) root: GET only. POST/DELETE here must be 405.
    location / {
        methods GET;
        root ./YoupiBanane;
        autoindex on;
    }

    # (3) post_body: accepts POST, body capped (see caveat).
    location /post_body {
        methods POST;
        root ./YoupiBanane;
        upload_store ./YoupiBanane/uploads;
        client_max_body_size 100;      # (3) this location's cap is 100 bytes
    }

    # (4) directory: GET, served from YoupiBanane, default file youpi.bad_extension.
    # (2) .bla under it runs the cgi_tester binary on POST.
    location /directory {
        methods GET POST;
        root ./YoupiBanane;
        index youpi.bad_extension;
        cgi_ext .bla /nfs/homes/faikhan/42_cursus/my-webserv/cgi_tester;
    }
}
